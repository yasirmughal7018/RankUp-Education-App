name: Mobile CI

on:
  push:
    paths:
      - "Mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "Mobile/**"
      - ".github/workflows/mobile-ci.yml"

defaults:
  run:
    working-directory: Mobile

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
