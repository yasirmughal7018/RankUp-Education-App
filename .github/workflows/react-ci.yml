name: React CI

on:
  push:
    paths:
      - "React/**"
      - ".github/workflows/react-ci.yml"
  pull_request:
    paths:
      - "React/**"
      - ".github/workflows/react-ci.yml"

defaults:
  run:
    working-directory: React

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: React/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.example.com/api
          VITE_APP_NAME: RankUp Education
